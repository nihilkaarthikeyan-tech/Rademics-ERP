name: Desktop Installer

# Manual-only: builds the Windows NSIS installer for the desktop agent on a clean
# GitHub runner. Exists because local builds are unreliable — Smart App Control on
# dev machines blocks electron-builder's unsigned NSIS tooling (spawn UNKNOWN).
#
# Required repo secrets:
#   RADEMICS_DESKTOP_KEY  — must equal DESKTOP_APP_KEY in the VPS .env.production;
#                           baked into the app so the API skips the login CAPTCHA
#                           for the desktop client. Without it, packaged logins fail.
#   DEPLOY_SSH_KEY / DEPLOY_HOST / DEPLOY_USER — same deploy key as deploy.yml,
#                           only used when `publish: true` is chosen below.
#
# Output: the "Rademics-Work-Monitoring-Setup" workflow artifact is always produced (downloadable
# from the run page). With `publish: true`, the installer + update-feed files
# (latest.yml, .blockmap) are ALSO uploaded to https://api.52digit.com/desktop-updates/
# — that's the ONLY thing that makes already-installed apps notice a new version
# (electron-updater checks that exact URL and nowhere else). Leave publish: false
# to just produce a downloadable build without pushing it to anyone.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to the live update feed (existing installs will pick this up)'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" — specifying it
      # here too makes action-setup@v4 error out on the mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Guard — desktop key secret must exist
        shell: bash
        run: |
          if [ -z "${{ secrets.RADEMICS_DESKTOP_KEY }}" ]; then
            echo "::error::Repo secret RADEMICS_DESKTOP_KEY is not set. Add it (Settings → Secrets and variables → Actions) with the same value as DESKTOP_APP_KEY on the VPS, then re-run."
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Bundle (main/preload/renderer)
        env:
          RADEMICS_DESKTOP_KEY: ${{ secrets.RADEMICS_DESKTOP_KEY }}
        run: pnpm --filter @rademics/desktop bundle

      - name: Build NSIS installer + update-feed metadata
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false' # unsigned for now; see code-signing note in the repo docs
        working-directory: apps/desktop
        # --publish never: still writes latest.yml + .blockmap locally (electron-updater
        # needs them), but never attempts a network publish itself — this workflow's own
        # rsync step below is what actually ships them, only when explicitly asked to.
        run: pnpm exec electron-builder --win nsis --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: Rademics-Work-Monitoring-Setup
          path: |
            apps/desktop/release/Rademics-Work-Monitoring-Setup.exe
            apps/desktop/release/latest.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error

      - name: Write version.json (drives the website's "Download desktop app" link)
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          # publishedAt starts the 24h grace window for the server's minimum-version
          # rule (desktop-version.service.ts) — outdated apps are blocked after it.
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "{\"version\":\"$VERSION\",\"publishedAt\":\"$NOW\"}" > apps/desktop/release/version.json
          echo "Publishing version $VERSION (grace window starts $NOW)"

      - name: Publish to the live update feed
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::publish=true requires the DEPLOY_SSH_KEY/DEPLOY_HOST/DEPLOY_USER secrets (same ones deploy.yml uses)."
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          # scp, not rsync — windows-latest runners ship OpenSSH but no rsync.
          scp -i ~/.ssh/deploy_key \
            apps/desktop/release/Rademics-Work-Monitoring-Setup.exe \
            apps/desktop/release/latest.yml \
            apps/desktop/release/*.blockmap \
            apps/desktop/release/version.json \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/rademics-erp/desktop-updates/"
          echo "✔ Published — installed apps auto-update within 4h (or on next launch); the website's download link updates immediately."
