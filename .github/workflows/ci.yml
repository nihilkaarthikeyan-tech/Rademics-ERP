name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Prisma generate reads the schema only; a dummy URL satisfies env() resolution.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      # apps/desktop depends on electron; this runner never launches it, so skip the
      # ~80-120MB binary download electron's postinstall would otherwise trigger.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json's "packageManager" — specifying it
      # here too makes action-setup@v4 error out on the mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @rademics/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
