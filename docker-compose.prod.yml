# ─────────────────────────────────────────────────────────────────────────────
# Rademics ERP — production stack (single-VPS Docker deployment).
#
# One image (built from ./Dockerfile) runs three services — api / internal /
# portal — alongside stateful infra (Postgres, Redis, MinIO). ClamAV is behind
# the "scan" profile so it is opt-in (its ~1GB signature DB is heavy on a shared
# box); enable it with `--profile scan` once file-upload scanning is needed.
#
# Runtime secrets come from ./.env.production (env_file). Build-time values
# (baked into the browser bundle) are the build args below — their real values
# ALSO live only in .env.production, substituted in via --env-file so nothing
# secret-shaped (DSNs, site keys) ever gets typed into this git-tracked file.
#
#   docker compose --env-file .env.production -f docker-compose.prod.yml build
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d postgres redis minio minio-setup
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d api internal portal
# ─────────────────────────────────────────────────────────────────────────────
name: rademics-erp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rademics} -d ${POSTGRES_DB:-rademics}"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [rademics]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [rademics]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD come from env_file. Do NOT add an
    # environment: block with ${VAR:-default} here — compose substitutes those
    # from the HOST shell (not env_file), silently starting MinIO with the
    # fallback creds while the API signs with the real ones.
    env_file: .env.production
    # Localhost-only: Docker's iptables rules bypass ufw, so a plain "9000:9000"
    # is reachable from the internet even with the firewall up. All public traffic
    # comes through nginx (storage.52digit.com → 127.0.0.1:9000); the console on
    # 9001 is admin-only — reach it via an SSH tunnel, never the open internet.
    ports:
      - "127.0.0.1:9000:9000"   # S3 API — browser reaches it via the nginx vhost
      - "127.0.0.1:9001:9001"   # MinIO console (admin, SSH tunnel only)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [rademics]

  # One-shot: create the app buckets, then exit.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.production
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc mb --ignore-existing local/$${S3_BUCKET}-quarantine &&
      echo 'MinIO buckets ready';
      "
    networks: [rademics]

  clamav:
    image: clamav/clamav:latest
    restart: unless-stopped
    profiles: ["scan"]
    volumes:
      - clamavdata:/var/lib/clamav
    networks: [rademics]

  api:
    image: rademics-erp:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.52digit.com/api"
        PUBLIC_HTTPS: "true"
        # Real values come from .env.production via --env-file (see header note) —
        # nothing secret-shaped is typed directly into this tracked file.
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
        NEXT_PUBLIC_PORTAL_SENTRY_DSN: "${NEXT_PUBLIC_PORTAL_SENTRY_DSN:-}"
        # Release + source map upload (Spec §11). SENTRY_RELEASE should be the git SHA
        # being deployed — the runbook exports it from `git rev-parse` before building.
        # Unset => no release tag and no upload; the build still succeeds.
        SENTRY_RELEASE: "${SENTRY_RELEASE:-}"
        SENTRY_ORG: "${SENTRY_ORG:-}"
        SENTRY_PROJECT: "${SENTRY_PROJECT:-}"
        SENTRY_PORTAL_PROJECT: "${SENTRY_PORTAL_PROJECT:-}"
        SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN:-}"
    restart: unless-stopped
    env_file: .env.production
    environment:
      # Tags API events with the deployed build. Same value as the build arg above, but
      # needed at RUNTIME here since the API reads it from the live process env.
      SENTRY_RELEASE: "${SENTRY_RELEASE:-}"
    working_dir: /app/apps/api
    # Apply any pending migrations on boot (idempotent), then start the API.
    command: sh -c "pnpm exec prisma migrate deploy && node dist/main.js"
    # Localhost-only (see minio note): nginx terminates TLS and proxies
    # api.52digit.com → 127.0.0.1:3002. Direct-IP access would bypass both
    # ufw (Docker punches through it) and Cloudflare, so never publish wide.
    ports:
      - "127.0.0.1:3002:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [rademics]

  internal:
    image: rademics-erp:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side error reporting (Spec §11) — same project/DSN as this app's
      # browser reporting (NEXT_PUBLIC_SENTRY_DSN build arg above), value from
      # .env.production via --env-file.
      SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
      SENTRY_RELEASE: "${SENTRY_RELEASE:-}"
    working_dir: /app/apps/internal
    command: pnpm start
    ports:
      - "127.0.0.1:3000:3000" # nginx-only (see minio note)
    depends_on:
      - api
    networks: [rademics]

  portal:
    image: rademics-erp:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side error reporting (Spec §11) — same project/DSN as this app's
      # browser reporting (NEXT_PUBLIC_PORTAL_SENTRY_DSN build arg above), value
      # from .env.production via --env-file.
      SENTRY_DSN: "${NEXT_PUBLIC_PORTAL_SENTRY_DSN:-}"
      SENTRY_RELEASE: "${SENTRY_RELEASE:-}"
    working_dir: /app/apps/portal
    command: pnpm start
    ports:
      - "127.0.0.1:3001:3001" # nginx-only (see minio note)
    depends_on:
      - api
    networks: [rademics]

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:

networks:
  rademics:
    driver: bridge
