# Packaging config for the desktop agent's Windows installer. Only touched by
# the `dist:win` script — never by `turbo run build`/`test`, so a normal web
# deploy never triggers electron-builder (see the implementation plan, step 1).
# appId must NEVER change — it's the app's identity for in-place upgrades and
# the auto-updater. Renaming the product is safe; renaming appId orphans installs.
appId: com.rademics.erp.desktop-agent
productName: Rademics Work Monitoring App
directories:
  output: release
  buildResources: assets
files:
  - out/**/*
  - package.json
asar: true

# Self-hosted update feed (electron-updater "generic" provider) — files land at
# https://api.52digit.com/desktop-updates/ (nginx static path on the existing VPS,
# no new domain/cert needed). Nobody gets an update unless this location is
# deliberately republished — see .github/workflows/desktop-installer.yml.
publish:
  provider: generic
  url: https://api.52digit.com/desktop-updates/
  channel: latest

win:
  target: nsis
  artifactName: 'ERP-Agent-Setup.${ext}'
  icon: assets/icon.png

nsis:
  # Per-user install: no admin rights required, matches a per-employee rollout.
  perMachine: false
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # Hard requirement (Spec: no auto-start): the installer must never register a
  # Startup shortcut or a Run registry key. electron-builder's NSIS target does
  # not do this by default — deliberately not opting into `runAfterFinish`-style
  # auto-launch-on-boot behavior. Do not add one without revisiting that requirement.
